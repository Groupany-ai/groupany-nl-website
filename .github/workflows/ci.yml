name: Lint & Build

on:
  push:
    branches: [main, "levi/**", "sam/**", "max/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
